server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # serve vite assets
  location /assets/ {
    try_files $uri =404;
  }

  # uploads proxy
  location /uploads/ {
    proxy_pass http://backend:8080/uploads/;
  }

  # React Router fallback
  location / {
    try_files $uri /index.html;
  }

  error_page 500 502 503 504 /50x.html;

  location = /50x.html {
    root /usr/share/nginx/html;
  }
}